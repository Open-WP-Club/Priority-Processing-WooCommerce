name: Build and Attach Plugin Zip

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get release info
      id: info
      run: |
        echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        echo "repo_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
        echo "release_id=${{ github.event.release.id }}" >> $GITHUB_OUTPUT

    - name: Copy plugin files
      run: |
        mkdir -p build/${{ steps.info.outputs.repo_name }}
        rsync -a . build/${{ steps.info.outputs.repo_name }}/ \
          --exclude='.git' \
          --exclude='.gitignore' \
          --exclude='.github' \
          --exclude='.claude' \
          --exclude='node_modules' \
          --exclude='vendor' \
          --exclude='build' \
          --exclude='tests' \
          --exclude='*.md' \
          --exclude='composer.json' \
          --exclude='composer.lock' \
          --exclude='package.json' \
          --exclude='package-lock.json' \
          --exclude='yarn.lock' \
          --exclude='phpunit.xml*' \
          --exclude='.phpunit*' \
          --exclude='.phpcs.xml*' \
          --exclude='webpack.config.js' \
          --exclude='gulpfile.js' \
          --exclude='src' \
          --exclude='assets/src' \
          --exclude='docker-compose.yml' \
          --exclude='Dockerfile' \
          --exclude='.vscode' \
          --exclude='.idea' \
          --exclude='.DS_Store' \
          --exclude='Thumbs.db' \
          --exclude='.env*' \
          --exclude='*.log'

    - name: Create zip file
      run: |
        cd build
        zip -r "../${{ steps.info.outputs.repo_name }}.zip" "${{ steps.info.outputs.repo_name }}/"

    - name: Upload release asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ steps.info.outputs.tag_name }}" \
          "./${{ steps.info.outputs.repo_name }}.zip" \
          --clobber

    - name: Update release description
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { owner, repo } = context.repo;
          const release_id = ${{ steps.info.outputs.release_id }};

          const { data: release } = await github.rest.repos.getRelease({ owner, repo, release_id });

          const buildInfo = `

          ---

          ### 📦 Plugin Download
          - **WordPress Plugin**: [\`${{ steps.info.outputs.repo_name }}.zip\`](https://github.com/${owner}/${repo}/releases/download/${{ steps.info.outputs.tag_name }}/${{ steps.info.outputs.repo_name }}.zip)
          - **Installation**: Download and upload via WordPress Admin → Plugins → Add New → Upload Plugin

          *Built automatically from tag ${{ steps.info.outputs.tag_name }}*`;

          await github.rest.repos.updateRelease({
            owner,
            repo,
            release_id,
            body: (release.body ?? '') + buildInfo
          });
